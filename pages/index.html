<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DemoApp Releases</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 32px;
    }

    h1 { margin-bottom: 4px; }
    .sub { color: #94a3b8; margin-bottom: 20px; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .version {
      font-weight: 700;
      font-size: 18px;
    }

    .latest {
      background: #22c55e;
      color: black;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 12px;
      margin-left: 6px;
    }

    .msg {
      margin-top: 8px;
      color: #cbd5e1;
    }

    .btns {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    a {
      background: #4f46e5;
      color: white;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
    }

    a.secondary { background: #0ea5e9; }
    a.latestBtn { background: #22c55e; color: black; font-weight: 700; }
  </style>
</head>

<body>
  <h1>DemoApp Releases</h1>
  <div class="sub">Latest builds</div>

  <div id="list">Loading...</div>

  <script>
    async function load() {
      const res = await fetch('./releases/index.json', { cache: 'no-store' });
      const data = await res.json();

      const root = document.getElementById('list');
      root.innerHTML = '';

      const latest = data[0];

      // 👉 TOP LATEST BUTTON
      const top = document.createElement('div');
      top.className = 'card';
      top.innerHTML = `
        <div class="version">
          Latest: v${latest.version}
          <span class="latest">latest</span>
        </div>

        <div class="msg">${latest.homeMessage ?? latest.demoMessage ?? ''}</div>

        <div class="btns">
          <a class="latestBtn" href="${latest.avaloniaUrl}">⬇ Download Latest (Avalonia)</a>
          <a class="latestBtn" href="${latest.windowsUrl}">⬇ Download Latest (Windows)</a>
          <a href="${latest.notesUrl}" target="_blank">Release Notes</a>
        </div>
      `;
      root.appendChild(top);

      // 👉 HISTORY
      data.forEach((r, i) => {
        const el = document.createElement('div');
        el.className = 'card';

        el.innerHTML = `
          <div class="version">
            v${r.version}
            ${i === 0 ? '<span class="latest">latest</span>' : ''}
          </div>

          <div class="msg">${r.homeMessage ?? r.demoMessage ?? ''}</div>

          <div class="btns">
            <a href="${r.avaloniaUrl}">Avalonia</a>
            <a href="${r.windowsUrl}">Windows</a>
            <a href="${r.notesUrl}" target="_blank">Notes</a>
          </div>
        `;

        root.appendChild(el);
      });
    }

    load();
  </script>
</body>
</html>
