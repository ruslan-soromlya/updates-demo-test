name: Build Demo Updates (Velopack + Pages)

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
      home_message:
        required: true
        type: string
      update_notes:
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

# ─────────────────────────────────────────────
jobs:

# ─────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - id: v
        shell: pwsh
        run: |
          $manual = "${{ inputs.version }}".Trim()

          if ($manual) {
            $version = $manual
          } else {
            $tag = git tag --list "v*" |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
              Sort-Object -Descending |
              Select-Object -First 1

            if ($tag) {
              $m = [regex]::Match($tag, '^v(\d+)\.(\d+)\.(\d+)$')
              $version = "$($m.Groups[1].Value).$($m.Groups[2].Value).$([int]$m.Groups[3].Value + 1)"
            } else {
              $version = "1.0.${{ github.run_number }}"
            }
          }

          "version=$version" >> $env:GITHUB_OUTPUT


# ─────────────────────────────────────────────
  build:
    needs: setup
    runs-on: windows-latest

    strategy:
      matrix:
        app:
          - name: avalonia-windows
            project: DemoApp.Aval/DemoApp.Aval.csproj
            exe: DemoApp.Aval.exe
            rid: win-x64
            os: [win]

          - name: avalonia-linux
            project: DemoApp.Aval/DemoApp.Aval.csproj
            exe: DemoApp.Aval
            rid: linux-x64
            os: [linux]

          - name: wpf-windows
            project: DemoApp.Windows/DemoApp.Windows.csproj
            exe: DemoApp.Windows.exe
            rid: win-x64
            os: [win]

    env:
      VERSION: ${{ needs.setup.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack
        shell: pwsh
        run: |
          dotnet tool install -g vpk
          "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Publish + Pack
        shell: pwsh
        run: |
          $out = "artifacts/${{ matrix.app.name }}"

          dotnet publish "${{ matrix.app.project }}" `
            -c Release `
            -r "${{ matrix.app.rid }}" `
            --self-contained true `
            -o publish `
            -p:Version=$env:VERSION

          vpk {{matrix.app.os}} pack `
            --packId "${{ matrix.app.name }}" `
            --packVersion $env:VERSION `
            --packDir publish `
            --mainExe "${{ matrix.app.exe }}" `
            --outputDir $out `
            --runtime "${{ matrix.app.rid }}"

      - name: Upload feed
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.name }}
          path: artifacts/${{ matrix.app.name }}


# ─────────────────────────────────────────────
  publish-pages:
    needs: [setup, build]
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ needs.setup.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all feeds
        uses: actions/download-artifact@v4
        with:
          path: feeds

      # ── Build Pages structure ──
      - name: Prepare Pages folder
        run: |
          mkdir -p pages/feeds

          cp -r feeds/* pages/feeds/

      # ── Simple registry (NO complex merging) ──
      - name: Build index.json
        run: |
          mkdir -p pages

          jq -n \
            --arg version "$VERSION" \
            --arg home "${{ inputs.home_message }}" \
            --arg notes "${{ inputs.update_notes }}" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              version: $version,
              homeMessage: $home,
              updateNotes: $notes,
              builtAt: $date,
              feeds: {
                avaloniaWindows: "/feeds/avalonia-windows/",
                avaloniaLinux: "/feeds/avalonia-linux/",
                wpfWindows: "/feeds/wpf-windows/"
              }
            }' > pages/index.json

      # ── Deploy Pages ──
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - uses: actions/deploy-pages@v4