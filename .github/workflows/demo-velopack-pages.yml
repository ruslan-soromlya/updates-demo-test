name: Build Demo Updates (Velopack + GitHub Releases)

on:
  workflow_dispatch:
    inputs:
      home_message:
        required: true
        type: string
      update_notes:
        required: true
        type: string

permissions:
  contents: write

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - id: v
        shell: pwsh
        run: |
          $tag = git tag --list "v*" |
            Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
            Sort-Object -Descending |
            Select-Object -First 1

          if ($tag) {
            $m = [regex]::Match($tag, '^v(\d+)\.(\d+)\.(\d+)$')
            $version = "$($m.Groups[1].Value).$($m.Groups[2].Value).$([int]$m.Groups[3].Value + 1)"
          } else {
            $version = "1.0.${{ github.run_number }}"
          }

          "version=$version" >> $env:GITHUB_OUTPUT


  build:
    needs: setup
    runs-on: windows-latest

    strategy:
      matrix:
        app:
          - name: avalonia
            displayName: Avalonia Windows
            artifact: avalonia-windows
            channel: windows
            project: DemoApp.Aval/DemoApp.Aval.csproj
            exe: DemoApp.Aval.exe
            rid: win-x64
            os: "[win]"

          - name: avalonia
            displayName: Avalonia Linux
            artifact: avalonia-linux
            channel: linux
            project: DemoApp.Aval/DemoApp.Aval.csproj
            exe: DemoApp.Aval
            rid: linux-x64
            os: "[linux]"

          - name: wpf
            displayName: WPF
            artifact: wpf-windows
            channel: windows
            project: DemoApp.Windows/DemoApp.Windows.csproj
            exe: DemoApp.Windows.exe
            rid: win-x64
            os: "[win]"

    env:
      VERSION: ${{ needs.setup.outputs.version }}
      REPO_URL: https://github.com/${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack
        shell: pwsh
        run: |
          dotnet tool install -g vpk
          "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Write release notes
        shell: pwsh
        run: |
          "${{ inputs.update_notes }}" | Out-File -FilePath release-notes.md -Encoding utf8

      # ───────────────────────── DEBUG BEFORE DOWNLOAD ─────────────────────────
      - name: DEBUG - BEFORE DOWNLOAD (workspace state)
        shell: pwsh
        run: |
          Write-Host "=== BEFORE DOWNLOAD ==="
          Get-Location
          Get-ChildItem -Recurse

      - name: Download previous release
        shell: pwsh
        run: |
          vpk download github `
            --repoUrl $env:REPO_URL `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --channel ${{ matrix.app.channel }} `
            --outputDir releases/${{ matrix.app.artifact }}
        continue-on-error: true

      # ───────────────────────── DEBUG AFTER DOWNLOAD ─────────────────────────
      - name: DEBUG - AFTER DOWNLOAD
        shell: pwsh
        run: |
          Write-Host "=== AFTER DOWNLOAD ==="
          Write-Host "TARGET:"
          Get-ChildItem -Recurse releases

      - name: Publish
        shell: pwsh
        run: |
          $msg = "${{ inputs.home_message }}" -replace ',', '%2C'
          dotnet publish "${{ matrix.app.project }}" `
            -c Release `
            -r "${{ matrix.app.rid }}" `
            --self-contained true `
            -o publish `
            -p:Version=$env:VERSION `
            -p:DemoMessage="$msg" `
            -p:DemoUpdateSource="https://github.com/${{ github.repository }}/releases/download/v$env:VERSION/"

      # ───────────────────────── DEBUG BEFORE PACK ─────────────────────────
      - name: DEBUG - BEFORE PACK
        shell: pwsh
        run: |
          Write-Host "=== BEFORE PACK ==="

          Write-Host "publish folder:"
          Get-ChildItem publish -Recurse -ErrorAction SilentlyContinue

          Write-Host "releases folder:"
          Get-ChildItem releases -Recurse -ErrorAction SilentlyContinue

      - name: Pack
        shell: pwsh
        run: |
          $out = "releases/${{ matrix.app.artifact }}"

          vpk "${{ matrix.app.os }}" pack `
            --packId "${{ matrix.app.name }}" `
            --packVersion $env:VERSION `
            --packDir publish `
            --mainExe "${{ matrix.app.exe }}" `
            --outputDir $out `
            --runtime "${{ matrix.app.rid }}" `
            --channel ${{ matrix.app.channel }} `
            --releaseNotes release-notes.md

      # ───────────────────────── DEBUG AFTER PACK ─────────────────────────
      - name: DEBUG - AFTER PACK (CRITICAL)
        shell: pwsh
        run: |
          Write-Host "=== AFTER PACK ==="

          Write-Host "FULL RELEASES TREE:"
          Get-ChildItem releases -Recurse -Force

          Write-Host "EXPECTED OUTPUT FOLDER:"
          $target = "releases/${{ matrix.app.artifact }}"

          if (Test-Path $target) {
            Write-Host "✔ EXISTS: $target"
            Get-ChildItem $target -Recurse -Force
          } else {
            Write-Host "❌ MISSING: $target"
          }

      # ───────────────────────── DEBUG GLOBAL SEARCH ─────────────────────────
      - name: DEBUG - FIND ALL OUTPUTS ANYWHERE
        shell: pwsh
        run: |
          Write-Host "=== SEARCHING FOR VELPACK OUTPUT ==="

          Get-ChildItem -Path . -Recurse -Force |
            Where-Object {
              $_.Name -match "releases|.nupkg|.AppImage|setup|delta|full|velopack"
            } |
            Select FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.artifact }}
          path: releases/${{ matrix.app.artifact }}/


  publish:
    needs: [setup, build]
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ needs.setup.outputs.version }}
      REPO_URL: https://github.com/${{ github.repository }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases
          merge-multiple: true

      - name: Install Velopack
        run: |
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # ───────────────────────── DEBUG BEFORE UPLOAD ─────────────────────────
      - name: DEBUG - BEFORE UPLOAD
        run: |
          echo "=== RELEASES TREE ==="
          find releases -type f || true

      - name: Upload Avalonia Windows
        run: |
          vpk upload github `
            --merge `
            --repoUrl $REPO_URL `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --outputDir releases/avalonia-windows `
            --channel windows `
            --publish `
            --releaseName "v$VERSION" `
            --tag v$VERSION `
            --targetCommitish ${{ github.sha }}

      - name: Upload Avalonia Linux
        run: |
          vpk upload github `
            --merge `
            --repoUrl $REPO_URL `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --outputDir releases/avalonia-linux `
            --channel linux `
            --publish `
            --releaseName "v$VERSION" `
            --tag v$VERSION `
            --targetCommitish ${{ github.sha }}

      - name: Upload WPF
        run: |
          vpk upload github `
            --merge `
            --repoUrl $REPO_URL `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --outputDir releases/wpf-windows `
            --channel windows `
            --publish `
            --releaseName "v$VERSION" `
            --tag v$VERSION `
            --targetCommitish ${{ github.sha }}