name: Build Demo Updates

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build. Leave blank to use 1.0.<run number>."
        required: false
        type: string

      demo_message:
        description: "Message shown on the app Home page after update."
        required: true
        default: "This update was built by GitHub Actions."
        type: string

      release_notes:
        description: "Release notes shown by the app update page."
        required: true
        default: "This release was built in GitHub Actions and published to GitHub Pages."
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ------------------------------------------------------------
      # CHECKOUT
      # ------------------------------------------------------------

      - name: Check out repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # .NET
      # ------------------------------------------------------------

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # ------------------------------------------------------------
      # DEBUG ENVIRONMENT
      # ------------------------------------------------------------

      - name: Debug runner environment
        shell: pwsh
        run: |
          Write-Host "==============================="
          Write-Host "RUNNER DEBUG"
          Write-Host "==============================="

          Write-Host ""
          Write-Host "[PWD]"
          Write-Host $PWD

          Write-Host ""
          Write-Host "[FILES]"
          Get-ChildItem -Force

          Write-Host ""
          Write-Host "[GITHUB WORKSPACE]"
          Write-Host $env:GITHUB_WORKSPACE

          Write-Host ""
          Write-Host "[POWERSHELL VERSION]"
          $PSVersionTable

      # ------------------------------------------------------------
      # VELOPACK
      # ------------------------------------------------------------

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Installing Velopack CLI..."

          dotnet tool install --global vpk

          "$env:USERPROFILE\.dotnet\tools" |
            Out-File `
              -FilePath $env:GITHUB_PATH `
              -Encoding utf8 `
              -Append

          Write-Host "Installed tools:"
          dotnet tool list --global

      # ------------------------------------------------------------
      # PREPARE RELEASE INPUTS
      # ------------------------------------------------------------

      - name: Prepare release inputs
        shell: pwsh
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "==============================="
          Write-Host "PREPARE RELEASE INPUTS"
          Write-Host "==============================="

          $version = $env:INPUT_VERSION

          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "1.0.${{ github.run_number }}"
          }

          Write-Host "[INFO] Version = $version"

          $notesDir = "artifacts\release-notes"

          Write-Host "[INFO] Creating release notes directory..."
          New-Item `
            -ItemType Directory `
            -Path $notesDir `
            -Force | Out-Null

          if (-not (Test-Path $notesDir)) {
            throw "Failed to create release-notes directory"
          }

          $notesFile = Join-Path $notesDir "latest.md"

          Write-Host "[INFO] Writing release notes..."
          Write-Host "[FILE] $notesFile"

          Set-Content `
            -Path $notesFile `
            -Value $env:RELEASE_NOTES `
            -Encoding UTF8

          if (-not (Test-Path $notesFile)) {
            throw "Release notes file was not created"
          }

          Write-Host "[OK] Release notes created"

          Write-Host ""
          Write-Host "[CONTENT]"
          Get-Content $notesFile

          "RELEASE_VERSION=$version" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

          "AVALONIA_FEED=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/demoaval" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

          "WINDOWS_FEED=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/demowindows" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

          Write-Host ""
          Write-Host "[GITHUB ENV WRITTEN]"
          Get-Content $env:GITHUB_ENV

      # ------------------------------------------------------------
      # BUILD VELOPACK RELEASES
      # ------------------------------------------------------------

      - name: Build Velopack feeds
        shell: pwsh
        env:
          DEMO_MESSAGE: ${{ inputs.demo_message }}
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "==============================="
          Write-Host "BUILD VELOPACK RELEASES"
          Write-Host "==============================="

          Write-Host "[INFO] RELEASE_VERSION = $env:RELEASE_VERSION"
          Write-Host "[INFO] AVALONIA_FEED = $env:AVALONIA_FEED"
          Write-Host "[INFO] WINDOWS_FEED  = $env:WINDOWS_FEED"

          Write-Host ""
          Write-Host "[CHECK] Build script exists?"

          if (-not (Test-Path ".\scripts\Build-VelopackReleases.ps1")) {
            throw "Build-VelopackReleases.ps1 not found"
          }

          Write-Host "[OK] Build script found"

          .\scripts\Build-VelopackReleases.ps1 `
            -Version $env:RELEASE_VERSION `
            -DemoMessage $env:DEMO_MESSAGE `
            -ReleaseNotes "artifacts\release-notes\latest.md" `
            -AvaloniaReleaseDir "artifacts\pages\demoaval" `
            -WindowsReleaseDir "artifacts\pages\demowindows" `
            -AvaloniaUpdateSource $env:AVALONIA_FEED `
            -WindowsUpdateSource $env:WINDOWS_FEED

          Write-Host ""
          Write-Host "[CHECK] artifacts/pages exists?"

          if (-not (Test-Path "artifacts\pages")) {
            throw "artifacts/pages was not created"
          }

          Write-Host "[OK] artifacts/pages exists"

          Write-Host ""
          Write-Host "[TREE]"
          Get-ChildItem `
            -Path "artifacts\pages" `
            -Recurse `
            -Force |
            Select-Object FullName, Length

      # ------------------------------------------------------------
      # PUBLISH MANIFEST
      # ------------------------------------------------------------

      - name: Publish release notes and build manifest
        shell: pwsh
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
          DEMO_MESSAGE: ${{ inputs.demo_message }}
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ""
          Write-Host "==============================="
          Write-Host "START RELEASE MANIFEST STEP"
          Write-Host "==============================="
          Write-Host ""

          try {

            $version = $env:RELEASE_VERSION
            $baseUrl = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

            Write-Host "[INFO] RELEASE_VERSION = $version"
            Write-Host "[INFO] BASE_URL        = $baseUrl"

            $pagesDir     = Join-Path $PWD "artifacts\pages"
            $notesDir     = Join-Path $pagesDir "releases\$version"
            $avRelDir     = Join-Path $pagesDir "demoaval\releases"
            $manifestPath = Join-Path $pagesDir "releases\index.json"

            Write-Host ""
            Write-Host "[PATHS]"
            Write-Host "pagesDir     = $pagesDir"
            Write-Host "notesDir     = $notesDir"
            Write-Host "avRelDir     = $avRelDir"
            Write-Host "manifestPath = $manifestPath"

            $sourceNotes = Join-Path $PWD "artifacts\release-notes\latest.md"

            Write-Host ""
            Write-Host "[CHECK] Verifying source release notes..."

            if (-not (Test-Path $sourceNotes)) {
              throw "Source release notes file does not exist: $sourceNotes"
            }

            Write-Host "[OK] Found release notes file"

            Write-Host ""
            Write-Host "[DEBUG] Release notes contents:"
            Get-Content $sourceNotes

            Write-Host ""
            Write-Host "[STEP] Creating directories..."

            foreach ($dir in @(
              $pagesDir,
              (Join-Path $pagesDir "releases"),
              $notesDir,
              (Join-Path $pagesDir "demoaval"),
              $avRelDir
            )) {

              Write-Host "[DIR] Ensuring directory exists: $dir"

              New-Item `
                -ItemType Directory `
                -Path $dir `
                -Force | Out-Null

              if (-not (Test-Path $dir)) {
                throw "Directory was NOT created successfully: $dir"
              }

              Write-Host "[OK] Directory exists"
            }

            Write-Host ""
            Write-Host "[DEBUG] artifacts/pages tree:"

            Get-ChildItem `
              -Path $pagesDir `
              -Recurse `
              -Force |
              Select-Object FullName

            $notesTarget = Join-Path $notesDir "notes.md"
            $latestTarget = Join-Path $avRelDir "latest.md"

            Write-Host ""
            Write-Host "[STEP] Copying release notes..."

            Write-Host "[COPY]"
            Write-Host "FROM: $sourceNotes"
            Write-Host "TO:   $notesTarget"

            Copy-Item `
              $sourceNotes `
              $notesTarget `
              -Force

            Write-Host "[OK] notes.md copied"

            Write-Host ""
            Write-Host "[COPY]"
            Write-Host "FROM: $sourceNotes"
            Write-Host "TO:   $latestTarget"

            Copy-Item `
              $sourceNotes `
              $latestTarget `
              -Force

            Write-Host "[OK] latest.md copied"

            Write-Host ""
            Write-Host "[CHECK] Verifying copied files..."

            foreach ($file in @($notesTarget, $latestTarget)) {

              Write-Host "[CHECK] $file"

              if (-not (Test-Path $file)) {
                throw "Copied file missing: $file"
              }

              Write-Host "[OK] File exists"

              Write-Host "[CONTENT]"
              Get-Content $file
            }

            Write-Host ""
            Write-Host "[STEP] Fetching existing manifest..."

            $existing = @()

            try {

              $manifestUrl = "$baseUrl/releases/index.json"

              Write-Host "[HTTP GET] $manifestUrl"

              $response = Invoke-WebRequest `
                -Uri $manifestUrl `
                -UseBasicParsing `
                -ErrorAction Stop

              Write-Host "[HTTP STATUS] $($response.StatusCode)"

              $existing = $response.Content | ConvertFrom-Json

              Write-Host "[OK] Existing manifest downloaded"

            } catch {

              Write-Host "[INFO] Existing manifest not found."
              Write-Host "[INFO] Starting fresh manifest."

              $existing = @()
            }

            Write-Host ""
            Write-Host "[STEP] Removing duplicate version entries..."

            $existing = @(
              $existing |
              Where-Object { $_.version -ne $version }
            )

            Write-Host "[INFO] Remaining entries: $($existing.Count)"

            Write-Host ""
            Write-Host "[STEP] Building new manifest entry..."

            $newEntry = [ordered]@{
              version     = $version
              builtAt     = (Get-Date).ToUniversalTime().ToString("o")
              runNumber   = "${{ github.run_number }}"
              demoMessage = $env:DEMO_MESSAGE
              notesUrl    = "$baseUrl/releases/$version/notes.md"
              avaloniaUrl = "$baseUrl/demoaval/Setup.exe"
              windowsUrl  = "$baseUrl/demowindows/Setup.exe"
            }

            $manifest = @($newEntry) + $existing

            Write-Host "[DEBUG] Manifest JSON:"
            $manifest | ConvertTo-Json -Depth 5

            Write-Host ""
            Write-Host "[STEP] Writing manifest file..."

            $manifest |
              ConvertTo-Json -Depth 5 |
              Set-Content `
                $manifestPath `
                -Encoding UTF8

            if (-not (Test-Path $manifestPath)) {
              throw "Manifest file was not created."
            }

            Write-Host "[OK] Manifest file created"

            Write-Host ""
            Write-Host "[DEBUG] Manifest contents:"
            Get-Content $manifestPath

            Write-Host ""
            Write-Host "[FINAL TREE]"

            Get-ChildItem `
              -Path $pagesDir `
              -Recurse `
              -Force |
              Select-Object FullName, Length

            Write-Host ""
            Write-Host "==============================="
            Write-Host "STEP COMPLETED SUCCESSFULLY"
            Write-Host "==============================="
            Write-Host ""

          }
          catch {

            Write-Host ""
            Write-Host "==============================="
            Write-Host "STEP FAILED"
            Write-Host "==============================="
            Write-Host ""

            Write-Host "[ERROR MESSAGE]"
            Write-Host $_

            Write-Host ""
            Write-Host "[SCRIPT STACK TRACE]"
            Write-Host $_.ScriptStackTrace

            Write-Host ""
            Write-Host "[DIRECTORY SNAPSHOT]"

            if (Test-Path "artifacts") {
              Get-ChildItem `
                -Path "artifacts" `
                -Recurse `
                -Force |
                Select-Object FullName, Length
            }
            else {
              Write-Host "artifacts directory does not exist"
            }

            throw
          }

      # ------------------------------------------------------------
      # CREATE DOWNLOAD PAGE
      # ------------------------------------------------------------

      - name: Create download page
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "==============================="
          Write-Host "CREATE DOWNLOAD PAGE"
          Write-Host "==============================="

          $baseUrl = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          Write-Host "[INFO] BASE URL = $baseUrl"

          if (-not (Test-Path "artifacts/pages")) {
            throw "artifacts/pages directory missing"
          }

          @"
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Demo Releases</title>
          </head>
          <body>
            <h1>Demo Releases</h1>
            <script>
              fetch('$baseUrl/releases/index.json')
                .then(r => r.json())
                .then(console.log);
            </script>
          </body>
          </html>
          "@ | Set-Content artifacts/pages/index.html -Encoding UTF8

          if (-not (Test-Path "artifacts/pages/index.html")) {
            throw "index.html was not created"
          }

          Write-Host "[OK] index.html created"

      # ------------------------------------------------------------
      # DEBUG FINAL OUTPUT
      # ------------------------------------------------------------

      - name: Debug final artifacts
        shell: pwsh
        run: |
          Write-Host "==============================="
          Write-Host "FINAL ARTIFACT TREE"
          Write-Host "==============================="

          if (-not (Test-Path "artifacts/pages")) {
            throw "artifacts/pages missing before upload"
          }

          Get-ChildItem `
            -Path "artifacts/pages" `
            -Recurse `
            -Force |
            Select-Object FullName, Length

      # ------------------------------------------------------------
      # ARTIFACT
      # ------------------------------------------------------------

      - name: Upload packaged feeds as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-velopack-feeds-${{ env.RELEASE_VERSION }}
          path: artifacts/pages

      # ------------------------------------------------------------
      # PAGES
      # ------------------------------------------------------------

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4