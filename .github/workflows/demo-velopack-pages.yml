name: Build Demo Updates

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build. Leave blank to use 1.0.<run number>."
        required: false
        type: string

      demo_message:
        description: "Message shown on the app Home page after update."
        required: true
        default: "This update was built by GitHub Actions."
        type: string

      release_notes:
        description: "Release notes shown by the app update page."
        required: true
        default: "This release was built in GitHub Actions and published to GitHub Pages."
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          dotnet tool install --global vpk
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare release inputs
        shell: pwsh
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          $version = $env:INPUT_VERSION

          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "1.0.${{ github.run_number }}"
          }

          New-Item -ItemType Directory -Path "artifacts\release-notes" -Force | Out-Null

          Set-Content `
            -Path "artifacts\release-notes\latest.md" `
            -Value $env:RELEASE_NOTES `
            -Encoding UTF8

          "RELEASE_VERSION=$version" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          "AVALONIA_FEED=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/demoaval" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          "WINDOWS_FEED=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/demowindows" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

      - name: Build Velopack feeds
        shell: pwsh
        env:
          DEMO_MESSAGE: ${{ inputs.demo_message }}
        run: |
          .\scripts\Build-VelopackReleases.ps1 `
            -Version $env:RELEASE_VERSION `
            -DemoMessage $env:DEMO_MESSAGE `
            -ReleaseNotes "artifacts\release-notes\latest.md" `
            -AvaloniaReleaseDir "artifacts\pages\demoaval" `
            -WindowsReleaseDir "artifacts\pages\demowindows" `
            -AvaloniaUpdateSource $env:AVALONIA_FEED `
            -WindowsUpdateSource $env:WINDOWS_FEED

      - name: Publish release notes
        shell: pwsh
        run: |
          New-Item `
            -ItemType Directory `
            -Path "artifacts\pages\demoaval\releases" `
            -Force | Out-Null

          Copy-Item `
            "artifacts\release-notes\latest.md" `
            "artifacts\pages\demoaval\releases\latest.md"

      - name: Create download page
        shell: pwsh
        run: |
          @"
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>DemoApp Downloads</title>

            <style>
              body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0f172a;
                color: white;
                font-family: Arial, sans-serif;
              }

              .card {
                width: 420px;
                background: #111827;
                padding: 32px;
                border-radius: 20px;
              }

              h1 {
                margin-top: 0;
              }

              a {
                display: block;
                margin-top: 16px;
                text-decoration: none;
                background: #4f46e5;
                color: white;
                padding: 14px;
                border-radius: 12px;
                text-align: center;
                font-weight: bold;
              }
            </style>
          </head>

          <body>
            <div class="card">
              <h1>DemoApp Downloads</h1>

              <a href="./demoaval/Setup.exe">
                Download Avalonia Installer
              </a>

              <a href="./demowindows/Setup.exe">
                Download Windows Installer
              </a>
            </div>
          </body>
          </html>
          "@ | Set-Content artifacts/pages/index.html

      - name: Upload packaged feeds as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-velopack-feeds-${{ env.RELEASE_VERSION }}
          path: artifacts/pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4