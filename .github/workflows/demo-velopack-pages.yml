name: Build Demo Updates (Velopack + GitHub Releases)

on:
  workflow_dispatch:
    inputs:
      home_message:
        required: true
        type: string
      update_notes:
        required: true
        type: string

permissions:
  contents: write

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - id: v
        shell: pwsh
        run: |
          $tag = git tag --list "v*" |
            Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
            Sort-Object -Descending |
            Select-Object -First 1

          if ($tag) {
            $m = [regex]::Match($tag, '^v(\d+)\.(\d+)\.(\d+)$')
            $version = "$($m.Groups[1].Value).$($m.Groups[2].Value).$([int]$m.Groups[3].Value + 1)"
          } else {
            $version = "1.0.${{ github.run_number }}"
          }

          "version=$version" >> $env:GITHUB_OUTPUT


  build:
    needs: setup
    runs-on: windows-latest

    strategy:
      matrix:
        app:
          - name: avalonia
            artifact: avalonia-windows
            channel: windows
            project: DemoApp.Aval/DemoApp.Aval.csproj
            exe: DemoApp.Aval.exe
            rid: win-x64
            os: "[win]"

          - name: avalonia
            artifact: avalonia-linux
            channel: linux
            project: DemoApp.Aval/DemoApp.Aval.csproj
            exe: DemoApp.Aval
            rid: linux-x64
            os: "[linux]"

          - name: wpf
            artifact: wpf-windows
            channel: windows
            project: DemoApp.Windows/DemoApp.Windows.csproj
            exe: DemoApp.Windows.exe
            rid: win-x64
            os: "[win]"

    env:
      VERSION: ${{ needs.setup.outputs.version }}
      REPO_URL: https://github.com/${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack
        shell: pwsh
        run: |
          dotnet tool install -g vpk
          "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Write release notes
        shell: pwsh
        run: |
          "${{ inputs.update_notes }}" | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Download previous release
        shell: pwsh
        run: |
          vpk download github `
            --repoUrl $env:REPO_URL `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --channel ${{ matrix.app.channel }} `
            --outputDir releases
        continue-on-error: true

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish "${{ matrix.app.project }}" `
            -c Release `
            -r "${{ matrix.app.rid }}" `
            --self-contained true `
            -o publish `
            -p:Version=$env:VERSION `
            -p:DemoMessage="${{ inputs.home_message }}" `
            -p:DemoUpdateSource="https://github.com/${{ github.repository }}/releases/download/v$env:VERSION/"

      - name: Pack
        shell: pwsh
        run: |
          vpk "${{ matrix.app.os }}" pack `
            --packId "${{ matrix.app.name }}" `
            --packVersion $env:VERSION `
            --packDir publish `
            --mainExe "${{ matrix.app.exe }}" `
            --outputDir releases `
            --runtime "${{ matrix.app.rid }}" `
            --channel ${{ matrix.app.channel }} `
            --releaseNotes release-notes.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.artifact }}
          path: releases/


  publish:
    needs: [setup, build]
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ needs.setup.outputs.version }}
      REPO_URL: https://github.com/${{ github.repository }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases
          merge-multiple: true

      - name: Install Velopack
        run: dotnet tool install -g vpk && echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Upload to GitHub Releases
        run: |
          vpk upload github \
            --repoUrl $REPO_URL \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --outputDir releases \
            --channel windows \
            --publish \
            --merge \
            --releaseName "v$VERSION" \
            --tag v$VERSION \
            --targetCommitish ${{ github.sha }}

          vpk upload github \
            --repoUrl $REPO_URL \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --outputDir releases \
            --channel linux \
            --publish \
            --merge \
            --releaseName "v$VERSION" \
            --tag v$VERSION \
            --targetCommitish ${{ github.sha }}